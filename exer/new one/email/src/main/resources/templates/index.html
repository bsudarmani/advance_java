<!DOCTYPE html>
<html>

<head>

    <title>Email Sender</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <style>

        body{
            font-family: Arial;
            text-align:center;
            background:cyan;
            padding-top:50px;
        }

        .box{
            background:#FAFAD2;
            width:300px;
            margin:auto;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        textarea{
            width:100%;
            height:100px;
            padding:10px;
        }

        button{
            margin-top:15px;
            padding:10px 20px;
            background:#7B68EE;
            color:white;
            border:none;
            border-radius:5px;
        }

    </style>

</head>

<body>

<div class="box">

    <h3 style="color:blue;">
        Welcome to Spring Boot Email Service
    </h3>

    <hr>

    <img src="/Spring.png" width="120" height="40"/>

    <hr>

    <form action="/send" method="post">

        <textarea name="emails"
                  placeholder="Enter email IDs separated by comma">
        </textarea>

        <br>

        <button type="submit">
            Send Email
        </button>

    </form>

</div>

</body>

</html>
